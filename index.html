<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --card: #16161f;
    --card2: #1e1e2a;
    --accent: #f0c040;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #7a7a99;
    --border: #2a2a3a;
    --super: #ff4466;
    --sport: #4488ff;
    --muscle: #ff8800;
    --motorcycle: #aa44ff;
    --suv: #22cc88;
    --sedan: #44ccdd;
    --compact: #ffcc22;
    --offroad: #88cc44;
    --classic: #cc8844;
    --sportclassic: #dd9933;
    --coupe: #5599ff;
    --van: #888888;
    --police: #3366ff;
    --air: #00ccff;
    --boat: #0088cc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
    border-bottom: 2px solid var(--accent);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 40px rgba(240,192,64,0.15);
  }
  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .logo-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(240,192,64,0.5);
  }
  .logo-sub {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .stat-badge {
    text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
  }
  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .stat-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* SEARCH & FILTER */
  .controls {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
  }
  .sort-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }
  .count-display {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: auto;
  }
  .count-display span { color: var(--accent); font-weight: 700; }

  /* SHOP TABS */
  .shop-tabs {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 32px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .shop-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    background: var(--card);
    color: var(--muted);
  }
  .shop-tab:hover { border-color: var(--border); color: var(--text); }
  .shop-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,0.08); }
  .shop-tab .tab-icon { font-size: 1.1rem; }
  .shop-tab .tab-count {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.7rem;
  }
  .shop-tab.active .tab-count { background: rgba(240,192,64,0.2); }

  /* CATEGORY FILTER PILLS */
  .cat-filters {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 32px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cat-pill {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .cat-pill.active, .cat-pill:hover {
    opacity: 1 !important;
    filter: brightness(1.2);
  }
  .cat-pill { opacity: 0.6; }

  /* GRID */
  .catalog-grid {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 32px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .vehicle-card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    position: relative;
  }
  .vehicle-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border-color: rgba(240,192,64,0.3);
  }
  .vehicle-card.out-of-stock {
    opacity: 0.5;
  }

  .card-img-wrap {
    position: relative;
    background: linear-gradient(135deg, #1a1a2e 0%, #0d0d1a 100%);
    height: 160px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .vehicle-card:hover .card-img-wrap img { transform: scale(1.05); }
  .img-fallback {
    font-size: 3.5rem;
    opacity: 0.3;
  }

  .cat-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
  }
  .stock-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,50,50,0.85);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .card-body {
    padding: 14px 16px;
  }
  .card-model {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .cat-tag {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .card-price {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* NO RESULTS */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .no-results .big-icon { font-size: 4rem; margin-bottom: 16px; }
  .no-results p { font-size: 1rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Section divider */
  .section-divider {
    max-width: 1600px;
    margin: 0 auto 16px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: var(--muted);
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>

function getCatStyle(cat) {
  const c = CAT_INFO[cat] || { color: "#888", icon: "🚗" };
  return c;
}

function formatPrice(p) {
  if (p >= 100000000) return `¥${(p/100000000).toFixed(1)}億`;
  if (p >= 10000) return `¥${(p/10000).toFixed(0)}万`;
  return `¥${p.toLocaleString()}`;
}

function getVehicleImg(model) {
  const m = model.toLowerCase().trim();
  return `https://cdn.sanity.io/images/jv3jfvkp/production/vehicles/${m}.jpg`;
}

function getCategoryEmoji(cat) {
  return (CAT_INFO[cat] || { icon: "🚗" }).icon;
}

let currentShop = "all";
let currentCat = "all";

function getShops() {
  const shops = new Set(VEHICLES.map(v => v.dealer));
  return ["all", ...Array.from(shops)];
}

function getCats(dealer) {
  const filtered = dealer === "all" ? VEHICLES : VEHICLES.filter(v => v.dealer === dealer);
  return ["all", ...Array.from(new Set(filtered.map(v => v.category))).sort()];
}

function buildShopTabs() {
  const el = document.getElementById("shop-tabs");
  const shops = getShops();
  el.innerHTML = shops.map(s => {
    const info = SHOP_INFO[s] || { label: s, icon: "🏪", color: "#888" };
    const count = s === "all" ? VEHICLES.filter(v => v.stock > 0).length : VEHICLES.filter(v => v.dealer === s && v.stock > 0).length;
    return `<div class="shop-tab${s === currentShop ? " active" : ""}" onclick="selectShop('${s}')" style="${s === currentShop ? `border-color:${info.color};color:${info.color};background:${info.color}18` : ""}">
      <span class="tab-icon">${info.icon}</span>
      ${info.label}
      <span class="tab-count">${count}</span>
    </div>`;
  }).join("");
}

function buildCatFilters() {
  const el = document.getElementById("cat-filters");
  const cats = getCats(currentShop);
  el.innerHTML = cats.map(c => {
    const info = CAT_INFO[c] || { label: c, color: "#888", icon: "🚗" };
    const label = c === "all" ? "すべて" : info.label;
    const color = c === "all" ? "#f0c040" : info.color;
    return `<div class="cat-pill${c === currentCat ? " active" : ""}" 
      style="background:${color}22;color:${color};border-color:${color}55"
      onclick="selectCat('${c}')">${c === "all" ? "🏪 すべて" : `${info.icon} ${label}`}</div>`;
  }).join("");
}

function selectShop(shop) {
  currentShop = shop;
  currentCat = "all";
  buildShopTabs();
  buildCatFilters();
  render();
}

function selectCat(cat) {
  currentCat = cat;
  buildCatFilters();
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort").value;

  let list = VEHICLES.filter(v => {
    if (currentShop !== "all" && v.dealer !== currentShop) return false;
    if (currentCat !== "all" && v.category !== currentCat) return false;
    if (q && !v.model.toLowerCase().includes(q)) return false;
    return true;
  });

  if (sort === "price-asc") list.sort((a,b) => a.price - b.price);
  else if (sort === "price-desc") list.sort((a,b) => b.price - a.price);
  else list.sort((a,b) => a.model.localeCompare(b.model));

  document.getElementById("display-count").textContent = list.length;

  const grid = document.getElementById("grid");
  if (list.length === 0) {
    grid.innerHTML = `<div class="no-results"><div class="big-icon">🔍</div><p>該当する車両が見つかりません</p></div>`;
    return;
  }

  grid.innerHTML = list.map(v => {
    const catStyle = getCatStyle(v.category);
    const catInfo = CAT_INFO[v.category] || { label: v.category, color: "#888", icon: "🚗" };
    const outOfStock = v.stock === 0;
    const modelDisplay = v.model.toLowerCase().trim();
    return `<div class="vehicle-card${outOfStock ? " out-of-stock" : ""}">
      <div class="card-img-wrap">
        <img 
          src="https://cdn.jsdelivr.net/gh/Stuyk/gtav-image-archive@master/vehicles/${modelDisplay}.webp"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          alt="${v.model}"
          loading="lazy"
        >
        <div class="img-fallback" style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-size:3rem;">${catInfo.icon}</div>
        ${outOfStock ? '<span class="stock-badge">在庫なし</span>' : ""}
        <div class="cat-bar" style="background:${catInfo.color}"></div>
      </div>
      <div class="card-body">
        <div class="card-model">${v.model.toUpperCase()}</div>
        <div class="card-meta">
          <span class="cat-tag" style="background:${catInfo.color}22;color:${catInfo.color}">${catInfo.icon} ${catInfo.label}</span>
          <span class="card-price">${formatPrice(v.price)}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function initStats() {
  document.getElementById("total-count").textContent = VEHICLES.length;
  document.getElementById("in-stock-count").textContent = VEHICLES.filter(v => v.stock > 0).length;
  const shops = new Set(VEHICLES.map(v => v.dealer));
  document.getElementById("shop-count").textContent = shops.size;
}

buildShopTabs();
buildCatFilters();
render();
</script>
</body>
</html>
